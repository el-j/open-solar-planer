name: Feature Request
description: Suggest a new feature or improvement
labels: ["type/feat", "status/planned"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to the Open Solar Planer!

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or gap this feature addresses.
      placeholder: As a user, I cannot currently enter a custom roof shape, so I have to approximate…
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you would like to see.
      placeholder: Add a polygon drawing tool on the canvas so users can draw their roof outline…
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What conditions must be true for this feature to be considered done?
      placeholder: |
        - [ ] User can draw a polygon outline with at least 3 vertices
        - [ ] Grid recalculates when vertices are moved
        - [ ] Panel count is correct for a rectangular polygon

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you have thought of?

  - type: dropdown
    id: phase
    attributes:
      label: Roadmap phase (if known)
      options:
        - "Phase 0 – Canvas Engine (v1.1)"
        - "Phase 1 – Polish & Panel Library (v1.2–v1.4)"
        - "Phase 2 – Multi-Area Projects (v2.0–v2.2)"
        - "Phase 3 – Cost Planning & BOM (v2.3–v2.5)"
        - "Phase 4 – Pitched Roofs & Pseudo-3D (v3.0–v3.2)"
        - "Phase 5 – Photo-to-Plan (v3.3–v3.5)"
        - "Phase 6 – Full 3D Editor (v4.0–v4.2)"
        - "Phase 7 – Off-Grid & Hybrid (v4.3–v5.0)"
        - "Unknown / New"

  - type: dropdown
    id: area
    attributes:
      label: Area of the app
      options:
        - Layout calculation
        - Canvas / Visualisation
        - Panel settings
        - Roof / Area settings
        - Export / Sharing
        - Performance
        - Accessibility
        - CI/CD / Tooling
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to make sure this is not a duplicate
          required: true
