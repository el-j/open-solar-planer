name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Lint/test/build needs read; Pages deploy needs pages + id-token write.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment runs at a time; never cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Setup GitHub Pages
        # Only configure Pages on pushes to main (not on PRs).
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        # Upload the dist/ folder so the deploy job can publish it.
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    # Only deploy on direct pushes to main — not on PRs.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: lint-test-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
