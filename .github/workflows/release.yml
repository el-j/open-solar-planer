name: Release Please

# Release Please watches commits on main and maintains a "release PR" that
# bumps package.json version and updates CHANGELOG.md based on Conventional
# Commits.  Merging that PR creates a GitHub Release + git tag.
#
# This is SEPARATE from the Pages deployment (handled by ci.yml).
# Relationship:
#   feat/fix commit → main → Release Please updates its PR
#   release PR merged → main → ci.yml deploys to Pages  AND
#                            → this workflow creates a GitHub Release + tag
#
# Nothing here builds or deploys — it only manages versioning.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: node
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
